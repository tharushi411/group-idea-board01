
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCSC Student Toolkit</title>
    <style>
        :root { --maroon: #800000; --gold: #FFD700; }
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; }
        .navbar { background: var(--maroon); color: var(--gold); padding: 15px; display: flex; justify-content: space-between; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .main { display: flex; flex: 1; }
        .sidebar { width: 250px; background: white; border-right: 3px solid var(--gold); padding: 20px; }
        .event { padding: 10px; margin: 10px 0; background: #fffafa; border-left: 4px solid var(--maroon); cursor: pointer; transition: 0.3s; }
        .event:hover { transform: scale(1.05); box-shadow: 0 0 10px var(--gold); }
        .content { flex: 1; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div>🎓 UCSC Student Toolkit</div>
        <div class="nav-links">
            <a href="#">GPA Calculator</a>
            <a href="#">Study Timer</a>
        </div>
    </nav>
    <div class="main">
        <aside class="sidebar">
            <h3>Upcoming Events</h3>
            <div class="event">📅 Workshop - Oct 12</div>
            <div class="event">📝 Quiz - Oct 15</div>
        </aside>
        <main class="content">
            <div style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <h2>Welcome to Student Toolkit</h2>
                <p>පහසුකම් භාවිතා කිරීමට මෙනුවෙන් අදාළ මෙවලම තෝරන්න.</p>
            </div>
        </main>
    </div>
</body>
</html>
